name: Hermes Config Validator

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/hermes-config-validator.yml'
      - '.github/schemas/**'
      - '.github/scripts/**'
      - '.hermes/skills/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/hermes-config-validator.yml'
      - '.github/schemas/**'
      - '.github/scripts/**'
      - '.hermes/skills/**'

jobs:
  validate-hermes-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml jsonschema croniter

      - name: Find SKILL.md files
        run: |
          find . -name "SKILL.md" -not -path "./node_modules/*" > skill_files.txt
          echo "Found $(wc -l < skill_files.txt) SKILL.md file(s)"

      - name: Validate each skill
        run: |
          ERROR_COUNT=0
          while IFS= read -r f; do
            python3 .github/scripts/validate-skill.py "$f" || ERROR_COUNT=$((ERROR_COUNT+1))
          done < skill_files.txt
          echo ""
          echo "==="
          if [ $ERROR_COUNT -gt 0 ]; then
            echo "FAIL: $ERROR_COUNT file(s) had errors"
            exit 1
          else
            echo "PASS: All skills validated"
          fi
